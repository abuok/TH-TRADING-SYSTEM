{% extends "base.html" %}

{% block content %}
<div class="util-257995">
    <h1>Daily Reports</h1>
    <p class="util-7abb3a">Links to historical daily performance summaries</p>
</div>

<div class="grid">
    {% for report in reports %}
    <a href="/dashboard/reports/{{ report }}" class="card util-2e2127">
        <div class="util-ee8a4b">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <div>
                <div class="util-952973">{{ report }}</div>
                <div class="util-bd308a">HTML Report File</div>
            </div>
        </div>
    </a>
    {% endfor %}
    {% if not reports %}
    <div class="card util-1c8f9c">
        No reports generated yet. Run the demo to generate one.
    </div>
    {% endif %}
</div>
{% endblock %}
