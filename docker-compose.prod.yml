# Production Docker Compose - Security Hardened, Resource Limited
version: '3.8'

services:
  # Database - Production Configuration
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?Error: POSTGRES_USER not set}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD not set}"
      POSTGRES_DB: "${POSTGRES_DB:-trading_prod}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Cache - Production Configuration
  redis:
    image: redis:7-alpine
    container_name: trading-redis-prod
    restart: always
    command: "redis-server --requirepass ${REDIS_PASSWORD:?Error: REDIS_PASSWORD not set}"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Ingestion Service - Production
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-ingestion-prod
    restart: always
    environment:
      - SERVICE_NAME=ingestion
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.ingestion.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Technical Service - Production
  technical:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-technical-prod
    restart: always
    environment:
      - SERVICE_NAME=technical
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.technical.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Risk Service - Production
  risk:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-risk-prod
    restart: always
    environment:
      - SERVICE_NAME=risk
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.risk.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Journal Service - Production
  journal:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-journal-prod
    restart: always
    environment:
      - SERVICE_NAME=journal
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.journal.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Dashboard Service - Production (Public Facing)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-dashboard-prod
    restart: always
    ports:
      - "8005:8000"
    environment:
      - SERVICE_NAME=dashboard
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env.prod
    volumes:
      - ./artifacts:/app/artifacts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.dashboard.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Orchestration Service - Production
  orchestration:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-orchestration-prod
    restart: always
    environment:
      - SERVICE_NAME=orchestration
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn services.orchestration.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - trading-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  trading-internal:
    driver: bridge
