groups:
  - name: tradehall_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "The service has been unreachable for more than 1 minute."

      - alert: DatabaseConnectionPoolHigh
        expr: db_pool_checked_out / db_pool_size > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High DB pool utilization on {{ $labels.instance }}"
          description: "Over 80% of the database connection pool is in use."

      - alert: ExcessiveRateLimiting
        expr: rate_limit_hits_total > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hit rate on {{ $labels.instance }}"
          description: "More than 50 requests per minute are being rejected."

      - alert: HighApprovalLatency
        expr: histogram_quantile(0.95, sum(rate(ticket_approval_duration_seconds_bucket[5m])) by (le)) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High ticket approval latency"
          description: "95% of tickets are taking longer than 5 minutes to be approved."

      - alert: DailyLossLimitApproaching
        expr: daily_loss_usd > 500
        labels:
          severity: warning
        annotations:
          summary: "Daily loss threshold approaching"
          description: "Current realized daily loss has exceeded $500."
