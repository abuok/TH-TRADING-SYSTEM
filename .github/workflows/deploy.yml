name: Deployment Pipeline

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy services to staging
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.STAGING_JWT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 deploy@$DEPLOY_HOST "cd /app && \
            git pull origin main && \
            docker-compose -f docker-compose.yml up -d && \
            docker-compose exec -T orchestration alembic upgrade head"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for release notes

      - name: Verify production requirements
        run: |
          # Verify version is bumped
          VERSION=$(cat VERSION)
          echo "Deploying version $VERSION"

          # Verify all tests passing
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "❌ Code quality checks failed"
            exit 1
          fi

          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi

      - name: Deploy services to production
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.PROD_JWT_SECRET }}
          AWS_SECRETS_MANAGER_SECRET: ${{ secrets.PROD_AWS_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 deploy@$DEPLOY_HOST \
            "cd /app && \
            git pull origin main && \
            docker-compose -f docker-compose.prod.yml pull && \
            docker-compose -f docker-compose.prod.yml up -d && \
            docker-compose -f docker-compose.prod.yml exec -T orchestration alembic upgrade head && \
            docker-compose -f docker-compose.prod.yml exec -T orchestration python -m pytest tests/ -v"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CHANGELOG.md
            VERSION
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Production Deployment*\nStatus: *${{ job.status }}*\nVersion: $(cat VERSION)"
                  }
                }
              ]
            }
