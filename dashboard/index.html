<!DOCTYPE html>
<html>
<head>
  <title>PHX v2 Command Center</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>PHX v2</h1>
  <div id="session"></div>
  <div id="systemStatus" class="status active">ACTIVE</div>
</div>

<!-- MAIN GRID -->
<div class="main">

  <!-- CHART -->
  <div class="chart">
    <iframe 
      src="https://www.tradingview.com/embed-widget/advanced-chart/"
      width="100%" height="100%">
    </iframe>
  </div>

  <!-- EXECUTION ENGINE -->
  <div class="engine">

    <h2>Execution Engine</h2>

    <div class="state">
      <p>Bias: <span id="bias"></span></p>
      <p>Sweep: <span id="sweep"></span></p>
      <p>Displacement: <span id="displacement"></span></p>
      <p>Structure: <span id="structure"></span></p>
      <p>Retest: <span id="retest"></span></p>
    </div>

    <div id="decision" class="decision">NO TRADE</div>

    <div class="confidence">
      Confidence: <span id="confidence">0%</span>
    </div>

  </div>

</div>

<!-- LOWER PANELS -->
<div class="lower">

  <!-- STATE MACHINE -->
  <div class="card">
    <h3>PHX Flow</h3>
    <div id="flow">
      <span class="step" id="step-bias">BIAS</span>
      <span class="step" id="step-sweep">SWEEP</span>
      <span class="step" id="step-disp">DISPLACE</span>
      <span class="step" id="step-structure">STRUCTURE</span>
      <span class="step" id="step-retest">RETEST</span>
    </div>
  </div>

  <!-- RISK -->
  <div class="card">
    <h3>Risk</h3>
    <p>Daily Loss: <span id="loss"></span></p>
    <p>Trades: <span id="trades"></span></p>
  </div>

  <!-- LIQUIDITY -->
  <div class="card">
    <h3>Liquidity</h3>
    <ul id="liquidity"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
